<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Product Studio">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070b12"/>
      <stop offset="55%" stop-color="#0e1520"/>
      <stop offset="100%" stop-color="#134e4a"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="15%" r="50%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <text x="80" y="220" fill="#eef3fb" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="64" font-weight="800">Product Studio</text>
  <text x="80" y="300" fill="#2dd4bf" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="28" font-weight="600">AI Product Video Generator</text>
  <text x="80" y="360" fill="#8b9bb4" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="24">Turn product photos into cinematic marketing reels</text>
  <rect x="80" y="420" width="220" height="48" rx="10" fill="#2dd4bf"/>
  <text x="110" y="451" fill="#070b12" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" font-weight="700">Generate reels</text>
</svg>
