version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # Client-only for Amplify Hosting. Express is NOT hosted here.
        # Production generation uses Supabase Edge `studio-api` (no VITE_API_URL needed).
        # Optional: set VITE_API_URL to a Node host to bypass Edge.
        # Checkout uses Supabase Edge Functions (create/confirm Razorpay).
        - npm run build:web
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .npm/**/*
customRules:
  - source: '/<*>'
    target: '/index.html'
    status: '200'
customHeaders:
  - pattern: '**/*'
    headers:
      - key: 'X-Frame-Options'
        value: 'DENY'
      - key: 'X-Content-Type-Options'
        value: 'nosniff'
      - key: 'Referrer-Policy'
        value: 'strict-origin-when-cross-origin'
      - key: 'Permissions-Policy'
        value: 'camera=(), microphone=(), geolocation=()'
      - key: 'Content-Security-Policy'
        value: "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; img-src 'self' data: blob: https:; media-src 'self' blob: https:; font-src 'self' https://fonts.gstatic.com data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' https://*.razorpay.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.razorpay.com https://generativelanguage.googleapis.com; frame-src https://*.razorpay.com;"
